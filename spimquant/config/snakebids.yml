#list of analysis levels in the bids app
analysis_levels: &analysis_levels
 - participant
 - group

#mapping from analysis_level to set of target rules or files
targets_by_analysis_level:
  participant:
    - 'all_participant'  # if '', then the first rule is run
  group:
    - 'all_group'

# Configure components:
# Each entry creates a new component that can be retreived within the workflow
# via `generate_inputs`.
# Filters are used to select paths: each filter has an `entity` key and a
# single value or list of values to select.
# Wildcards are used to mark variable parts of paths. Each wildcard is an
# entity, such as `subject` or `session`, that may vary across component paths.
pybids_inputs:
  spim:
    filters:
      suffix: 'SPIM'
      extension: 'ome.zarr'
      sample: brain
    wildcards:
      - subject
      - session
      - sample
      - acquisition
      - staining
  mri:
    filters:
      suffix: 'T2w'
      extension: 'nii.gz'
      datatype: 'anat'
    wildcards:
      - subject
      - session
      - acquisition
      - run
      - reconstruction
      - suffix
      - extension


#configuration for the command-line parameters to make available
# passed on the argparse add_argument()
parse_args:
  --work_dir:
    help: "Local path to use for temporary files\n"
    type: str
    dest: work
    default: null

  --template:
    help: "Template to use for SPIM registration\n"
    default: ABAv3
    choices: 
     - ABAv3
     - DSURQE
     - gubra
     - MBMv3
     - turone

  --via-template:
    help: "Intermediate template for multi-step registration. Subject is first registered to this template, then this template is registered to the final --template. Transforms are concatenated to produce a single subject-to-template composite warp. (default: %(default)s)"
    default: null
    choices:
      - ABAv3
      - DSURQE
      - gubra
      - MBMv3
      - turone

  --atlas_segs:
    help: "Atlas segmentations to use with the chosen template (default: predefined list or all)"
    default: null
    action: store
    nargs: '+'

  --template_crop:
    help: "Crop template along X-axis to retain specific hemisphere for registration (default: %(default)s)"
    choices: 
      - left
      - right
    default: null

  --stains_for_reg:
    help: "Possible stains to use for registration (will choose first available, in order)\n (default: %(default)s)"
    default: 
      - PI
      - YOPRO
      - YoPro
      - YoPro1
      - AutoF
      - autof
    action: store
    nargs: '+'

  --stains_for_seg:
    help: "List of stains to use for segmentation and quantification (will segment any that match the data)\n (default: %(default)s)"
    default: 
      - abeta
      - Abeta
      - BetaAmyloid
      - AlphaSynuclein
      - Iba1
      - ChAT
    action: store
    nargs: '+'

  --stains_for_vessels:
    help: "List of stains to use for vessel segmentation and quantification (will choose first available, in order)\n (default: %(default)s)"
    default: 
      - CD31
      - Lectin
    action: store
    nargs: '+'

  --registration_level:
    help: "Downsampling level to use for registration (level 0 is full res, level 1 is 50% size, ...) (default: 5)"
    type: int
    default: 5

  --segmentation_level:
    help: "Downsampling level to use for segmentation (including vessels) (level 0 is full res, level 1 is 50% size, ...) (default: 0)"
    type: int
    default: 0

  --no_segmentation:
    help: "Skip segmentation and quantification of stains, i.e. perform registration only (default: %(default)s)"
    action: store_true
    default: False

  --no_vessels:
    help: "Skip segmentation and quantification of vessels (default: %(default)s)"
    action: store_true
    default: False

  --correction_method:
    help: "Method to use for intensity non-uniformity correction, prior to performing segmentation (default: %(default)s)"
    choices: 
      - gaussian
      - n4
    default: n4


  --seg_method:
    help: "Method to use for microscopy segmentation (e.g. plaques, protein deposits, cells) applied to 'stains_for_seg' channels, and used to calculate field fractions. "
    default: 
      - otsu+k3i2
    nargs: '+'

  --seg_hist_percentile_range:
    help: "Percentile range to use for histogram calculation in multiotsu segmentation. Only applicable when seg_method is otsu+k{}i{}. Specify 2 numbers for the low and high percentiles (default: %(default)s)"
    default:
      - 1
      - 99
    nargs: 2
    type: float

  --seg_hist_bin_width:
    help: "Bin width to use for histogram calculation in multiotsu segmentation. Only applicable when seg_method is otsu+k{}i{}. (default: %(default)s)"
    default: 1
    type: float


  --register_to_mri:
    help: "Register the lightsheet data directly to a corresponding MRI (from the BIDS dataset)"
    action: store_true
    default: False

  --template_mri:
    help: "Template to use for MRI registration to obtain brain mask\n"
    default: MouseIn
    choices:
      - MouseIn
      - DSURQE
      - MBMv3
      - turone

  --mri_resample_percent:
    help: "Resampling factor for multi-MRI averaging to create super-resolved images, as a percent (default: %(default)s). Use 200 for upsampling to twice the resolution"
    default: 100

  --orientation:
    help: "Forcefully set the orientation of the input OME Zarr. Only use this if the orientation in the zarr metadata is incorrect and not easily changed. Note, this orientation string is defined in XYZ, with the letter of the increasing direction. Blaze data stitched with SPIMprep should be RPI, Imaris stitched data should be RAI, and Lifecanvas stitched data should be RAS. "
    default: null
    

  --dask_scheduler:
    help: "Dask scheduler to use for parallel processing in workflow scripts (default: %(default)s)"
    choices:
      - threads
      - distributed
    default: distributed

  --qc_roi_zoom_bg_n4:
    help: "Use n4 bias-field corrected OME-Zarr as background image in the ROI zoom montage QC figures instead of the raw SPIM (only effective when --correction_method n4) (default: %(default)s)"
    action: store_true
    default: False

  --sloppy:
    help: "Use low-quality parameters for speed (USE FOR TESTING ONLY)"
    action: store_true
    default: False


  --skip-bids-validation:
    help: |
      Skip validation of BIDS dataset. BIDS validation is performed by
      default using the bids-validator plugin (if installed/enabled) or with the pybids
      validator implementation (if bids-validator is not installed/enabled).
    dest: "plugins.validator.skip"
    action: "store_true"
    default: False

  --patch_size:
    help: "Size of patches to extract in voxels (x, y, z) (default: %(default)s)"
    default:
      - 256
      - 256
      - 256
    nargs: 3
    type: int

  --patch_atlas_segs:
    help: "Atlas segmentations to use for extracting patches (default: coarse)"
    default:
      - coarse
    action: store
    nargs: '+'


  --n_patches_per_label:
    help: "Number of patches to extract per atlas label (default: %(default)s)"
    default: 5
    type: int

  --patch_labels:
    help: "List of atlas label names, abbreviations, or indices to extract patches from. If not specified, patches are extracted from all labels."
    default: null
    nargs: '+'

  --patch_seed:
    help: "Random seed for reproducible patch sampling (default: %(default)s)"
    default: 42
    type: int

  --crop_labels:
    help: "List of atlas label names, abbreviations, or indices to extract as Imaris crops. If not specified, all labels are cropped."
    default: null
    nargs: '+'

  --crop_atlas_segs:
    help: "Atlas segmentations to use for extracting Imaris crops (default: coarse)"
    default:
      - coarse
    action: store
    nargs: '+'

  --contrast_column:
    help: "Column name in participants.tsv to use for defining group contrasts (e.g., 'treatment', 'genotype'). Required for group-level statistical analysis."
    default: null
    type: str

  --contrast_values:
    help: "Two group values for contrast comparison (e.g., 'control' 'drug'). Used with --contrast_column for statistical testing. Provide exactly 2 values."
    default: null
    nargs: 2


#--- workflow specific configuration -- 


ome_zarr:
  max_downsampling_layers: 4 # e.g. 4 levels: { 0: orig, 1: ds2, 2: ds4, 3: ds8, 4: ds16}
  rechunk_size: #z, y, x
    - 1 
    - 1024
    - 1024
  scaling_method: 'local_mean' #can be nearest, gaussian, local_mean, zoom (zoom uses spline interp)

templates:
  ABAv3:
    anat: https://zenodo.org/records/18906782/files/tpl-ABAv3_anat.nii.gz
    mask: https://zenodo.org/records/18906782/files/tpl-ABAv3_desc-brain_mask.nii.gz
    spim_templates: #sorted in priority order:
      YoPro: https://zenodo.org/records/18749025/files/tpl-ABAv3_level-5_stain-YoPro_SPIM.nii.gz
      Iba1: https://zenodo.org/records/18749025/files/tpl-ABAv3_level-5_stain-Iba1_SPIM.nii.gz
      Abeta: https://zenodo.org/records/18749025/files/tpl-ABAv3_level-5_stain-Abeta_SPIM.nii.gz
    default_segs:
      - all
      - coarse
      - mid
      - fine
    atlases:
      all: 
        dseg: https://zenodo.org/records/18906782/files/tpl-ABAv3_seg-all_dseg.nii.gz
        tsv: https://zenodo.org/records/18906782/files/tpl-ABAv3_seg-all_dseg.tsv
      allsym: 
        dseg: https://zenodo.org/records/18906782/files/tpl-ABAv3_seg-allsym_dseg.nii.gz
        tsv: https://zenodo.org/records/18906782/files/tpl-ABAv3_seg-allsym_dseg.tsv
      coarse:
        dseg: https://zenodo.org/records/18906782/files/tpl-ABAv3_seg-coarse_dseg.nii.gz
        tsv: https://zenodo.org/records/18906782/files/tpl-ABAv3_seg-coarse_dseg.tsv
      mid:
        dseg: https://zenodo.org/records/18906782/files/tpl-ABAv3_seg-mid_dseg.nii.gz
        tsv: https://zenodo.org/records/18906782/files/tpl-ABAv3_seg-mid_dseg.tsv
      fine:
        dseg: https://zenodo.org/records/18906782/files/tpl-ABAv3_seg-fine_dseg.nii.gz
        tsv: https://zenodo.org/records/18906782/files/tpl-ABAv3_seg-fine_dseg.tsv
      roi22:
        dseg: https://zenodo.org/records/18906782/files/tpl-ABAv3_seg-roi22_dseg.nii.gz
        tsv: https://zenodo.org/records/18906782/files/tpl-ABAv3_seg-roi22_dseg.tsv
      roi82:
        dseg: https://zenodo.org/records/18906782/files/tpl-ABAv3_seg-roi82_dseg.nii.gz
        tsv: https://zenodo.org/records/18906782/files/tpl-ABAv3_seg-roi82_dseg.tsv
      roi198:
        dseg: https://zenodo.org/records/18906782/files/tpl-ABAv3_seg-roi198_dseg.nii.gz
        tsv: https://zenodo.org/records/18906782/files/tpl-ABAv3_seg-roi198_dseg.tsv
  MouseIn:
    # MP2RAGE inv1 chosen since its most similar to the MT GRE I had on hand.. better to create a 
    # new template later..
    anat: 'tpl-MouseIn/tpl-MouseIn_res-1_inv-1_MP2RAGE.nii.gz'
    mask: 'tpl-MouseIn/tpl-MouseIn_res-1_desc-brain_mask.nii.gz'

  MBMv3:
    anat: 'tpl-MBMv3/tpl-MBMv3_T2w.nii.gz'
    mask: 'tpl-MBMv3/tpl-MBMv3_desc-brain_mask.nii.gz'
    atlases:
      paxinos: 
        dseg: 'tpl-MBMv3/tpl-MBMv3_seg-paxinos_dseg.nii.gz'
        tsv: 'tpl-MBMv3/tpl-MBMv3_seg-paxinos_dseg.tsv'

  turone:
    anat: 'tpl-turone/tpl-turone_T2w.nii.gz'
    atlases:
      all:
        dseg: 'tpl-turone/tpl-turone_seg-all_dseg.nii.gz'
        tsv: 'tpl-turone/tpl-turone_seg-all_dseg.tsv'

  DSURQE:
    anat: https://www.mouseimaging.ca/repo/DSURQE_40micron/Dorr_2008_Steadman_2013_Ullmann_2013_Richards_2011_Qiu_2016_Egan_2015_40micron/nifti/DSURQE_40micron_average.nii
    mask: https://www.mouseimaging.ca/repo/DSURQE_40micron/Dorr_2008_Steadman_2013_Ullmann_2013_Richards_2011_Qiu_2016_Egan_2015_40micron/nifti/DSURQE_40micron_mask.nii
    atlases:
      all: 
        dseg: https://www.mouseimaging.ca/repo/DSURQE_40micron/Dorr_2008_Steadman_2013_Ullmann_2013_Richards_2011_Qiu_2016_Egan_2015_40micron/nifti/DSURQE_40micron_labels.nii
        custom_csv: https://www.mouseimaging.ca/repo/DSURQE_40micron/Dorr_2008_Steadman_2013_Ullmann_2013_Richards_2011_Qiu_2016_Egan_2015_40micron/mappings/DSURQE_40micron_R_mapping.csv
        tsv: tpl-DSURQE/seg-all_tpl-DSURQE_dseg.tsv


models:
  vesselfm: https://huggingface.co/bwittmann/vesselFM/resolve/main/vesselFM_base.pt


  
templatereg:
  desc: N4brain
  zooms:
    - 40

masking:
  gmm_init_k: 9
  gmm_min_k: 2
  gmm_bg_class: 1
  pre_atropos_downsampling: '50%'


reg_mri:
  rigidgreedy:
    iters: 100x100x50
    gradsigma: 3
    warpsigma: 3
    radius: 2x2x2
  greedy:
    dof: 12 
    iters: 100x100x50x0
    gradsigma: 3
    warpsigma: 3
    radius: 2x2x2


stain_defaults:
  regionprop_filters:
    YoPro:
      area:
        - ">="
        - 100


regionprop_filters:
  area:
    - ">="
    - 200

regionprop_outputs:
  centroid: pos
  area: nvoxels

coord_column_names:
  - pos_x
  - pos_y
  - pos_z

template_coord_column_names:
  - template_x
  - template_y
  - template_z

template_coloc_coord_column_names:
  - template_coloc_x
  - template_coloc_y
  - template_coloc_z

#metrics to compute feature maps for
# (can be from regionprops_outputs too)
seg_metrics:
  - fieldfrac
  - density
  - count
  - volume
  - nvoxels

vessel_seg_method: vesselfm

vessel_metrics:
  - fieldfrac


coloc_seg_metrics:
  - overlapratio
  - distance
  - density
  - count

stats_maps:
  - tstat
  - pval
  - cohensd
