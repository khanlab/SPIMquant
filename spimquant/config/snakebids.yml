#list of analysis levels in the bids app
analysis_levels: &analysis_levels
 - participant
 - group

#mapping from analysis_level to set of target rules or files
targets_by_analysis_level:
  participant:
    - 'all_participant'  # if '', then the first rule is run
  group:
    - 'all_group'

# Configure components:
# Each entry creates a new component that can be retreived within the workflow
# via `generate_inputs`.
# Filters are used to select paths: each filter has an `entity` key and a
# single value or list of values to select.
# Wildcards are used to mark variable parts of paths. Each wildcard is an
# entity, such as `subject` or `session`, that may vary across component paths.
pybids_inputs:
  spim:
    filters:
      suffix: 'SPIM'
      extension:
        - ome.zarr
        - ims
      sample: brain
    wildcards:
      - subject
      - session
      - sample
      - acquisition
      - staining
  mri:
    filters:
      suffix: 'T2w'
      extension: 'nii.gz'
      datatype: 'anat'
    wildcards:
      - subject
      - session
      - acquisition
      - run
      - reconstruction
      - suffix
      - extension


#configuration for the command-line parameters to make available
# passed on the argparse add_argument()
parse_args:
  --work_dir:
    help: "Local path to use for temporary files\n"
    type: str
    dest: work
    default: null

  --template:
    help: "Template to use for SPIM registration\n"
    default: ABAv3
    choices: 
     - ABAv3
     - DSURQE
     - gubra
     - MBMv3
     - turone

  --atlas_segs:
    help: "Atlas segmentations to use with the chosen template (default: predefined list or all)"
    default: null
    action: store
    nargs: '+'

  --template_crop:
    help: "Crop template along X-axis to retain specific hemisphere for registration (default: %(default)s)"
    choices: 
      - left
      - right
    default: null

  --sample_staining:
    help: "Override sample staining for input data. When absent, sample staining are read from OME-Zarr channel_labels metadata and overridden by _SPIM.json sidecars (SampleStaining key) if present. CLI values take highest precedence."
    default: null
    action: store
    nargs: '+'

  --ignore_stains:
    help: "Stain(s) to ignore when setting up the workflow. Can use this option to make the dataset staining uniform (e.g. by ignoring stains that are not present in all the subjects)."
    default: null
    action: store
    nargs: '+'

  --stains_for_reg:
    help: "Possible stains to use for registration (will choose first available, in order)\n (default: %(default)s)"
    default: 
      - PI
      - YOPRO
      - YoPro
      - YoPro1
      - AutoF
      - autof
    action: store
    nargs: '+'

  --stains_for_seg:
    help: "List of stains to use for segmentation and quantification (will segment any that match the data)\n (default: %(default)s)"
    default: 
      - abeta
      - Abeta
      - BetaAmyloid
      - AlphaSynuclein
      - Iba1
      - NeuN
      - Olig2
      - ChAT
      - VAChT
    action: store
    nargs: '+'

  --stains_for_vessels:
    help: "List of stains to use for vessel segmentation and quantification (will choose first available, in order)\n (default: %(default)s)"
    default: 
      - CD31
      - Lectin
    action: store
    nargs: '+'

  --registration_level:
    help: "Downsampling level to use for registration (level 0 is full res, level 1 is typically downsampled by 2, ...) (default: 5)"
    type: int
    default: 5

  --segmentation_level:
    help: "Downsampling level to use for segmentation (including vessels) (level 0 is full res, level 1 is typically downsampled by 2, ...) (default: 0)"
    type: int
    default: 0

  --no_segmentation:
    help: "Skip segmentation and quantification of stains, i.e. perform registration only (default: %(default)s)"
    action: store_true
    default: False

  --no_vessels:
    help: "Skip segmentation and quantification of vessels (default: %(default)s)"
    action: store_true
    default: False

  --correction_method:
    help: "Method to use for intensity non-uniformity correction, prior to performing segmentation (default: %(default)s)"
    choices: 
      - gaussian
      - n4
    default: n4


  --seg_method:
    help: >
      Method(s) to use for microscopy segmentation (e.g. plaques, protein
      deposits, cells) applied to 'stains_for_seg' channels.

      Supported methods:

      ``th<value>`` – simple fixed intensity threshold, e.g. ``th500`` applies
      a threshold of 500.

      ``otsu+k<k>i<i>`` – multi-level Otsu thresholding.  Fits k intensity
      classes to the global histogram and uses threshold index i (0-based) as
      the segmentation boundary.  Example: ``otsu+k3i2`` fits 3 classes and
      selects the 2nd threshold (between the 2nd and 3rd class).

      ``gmm+n<n>k<k>`` – Gaussian Mixture Model (GMM) tail-thresholding.
      Fits a GMM with n components to the log1p-transformed global intensity
      histogram, sorts the components by mean intensity ascending, and defines
      the threshold from the highest-intensity component as
      ``threshold = expm1(mean_n + k * sigma_n)``.  The float multiplier k
      may be encoded with 'p' as a decimal separator to keep BIDS-compatible
      filenames, e.g. ``gmm+n2k2p5`` → n=2, k=2.5.
    default:
      - gmm+n3k4
    nargs: '+'

  --seg_hist_percentile_range:
    help: "Percentile range to use for histogram calculation in histogram-based segmentation methods (otsu+k{}i{} and gmm+n{}k{}). Specify 2 numbers for the low and high percentiles (default: %(default)s)"
    default:
      - 1
      - 99.5
    nargs: 2
    type: float

  --seg_hist_bin_width:
    help: "Bin width to use for histogram calculation in histogram-based segmentation methods (otsu+k{}i{} and gmm+n{}k{}). (default: %(default)s)"
    default: 1
    type: float


  --register_to_mri:
    help: "Register the lightsheet data directly to a corresponding MRI (from the BIDS dataset)"
    action: store_true
    default: False

  --template_mri:
    help: "Template to use for MRI registration to obtain brain mask\n"
    default: MouseIn
    choices:
      - MouseIn
      - DSURQE
      - MBMv3
      - turone

  --mri_resample_percent:
    help: "Resampling factor for multi-MRI averaging to create super-resolved images, as a percent (default: %(default)s). Use 200 for upsampling to twice the resolution"
    default: 100

  --orientation:
    help: "Forcefully set the orientation for all input SPIM datasets. When absent, orientation is read from OME-Zarr metadata and overridden by _SPIM.json sidecars if present (with the JSON key OrientationStringXYZ). CLI values take highest precedence. Note, this orientation string is defined in XYZ, with the letter of the increasing direction. Generally speaking, Blaze data stitched with SPIMprep should be RPI, Imaris stitched data should be RAI, and Lifecanvas stitched data should be RAS (though this may differ if brains are upside down, etc...) "
    default: null
    

  --dask_scheduler:
    help: "Dask scheduler to use for parallel processing in workflow scripts (default: %(default)s)"
    choices:
      - threads
      - distributed
    default: distributed

  --qc_instance_seg:
    help: "Generate instance-level QC outputs, including animated gifs (default: %(default)s)"
    action: store_true
    default: False

  --qc_roi_zoom_bg_n4:
    help: "Use n4 bias-field corrected OME-Zarr as background image in the ROI zoom montage QC figures instead of the raw SPIM (only effective when --correction_method n4) (default: %(default)s)"
    action: store_true
    default: False

  --zarr-store-ext:
    help: "File format for intermediate OME-Zarr stores: 'ome.zarr' (directory) or 'ozx' (single zip file) (default: %(default)s)"
    choices:
      - ome.zarr
      - ozx
    default: ozx
    dest: zarr_store_ext

  --zarr-store-chunks:
    help: "Chunk size (c, x, y, z) for intermediate OME-Zarr stores (default: %(default)s)"
    default:
      - 1
      - 256
      - 256
      - 256
    nargs: 4
    type: int
    dest: zarr_store_chunks

  --zarr-store-shards:
    help: "Shard size (c, x, y, z) for intermediate OME-Zarr stores. Disabled by default and when --zarr-store-ext is 'ozx'."
    default: null
    nargs: 4
    type: int
    dest: zarr_store_shards

  --sloppy:
    help: "Use low-quality parameters for speed (USE FOR TESTING ONLY)"
    action: store_true
    default: False


  --skip-bids-validation:
    help: |
      Skip validation of BIDS dataset. BIDS validation is performed by
      default using the bids-validator plugin (if installed/enabled) or with the pybids
      validator implementation (if bids-validator is not installed/enabled).
    dest: "plugins.validator.skip"
    action: "store_true"
    default: False

  --patch_size:
    help: "Size of patches to extract in voxels (x, y, z) (default: %(default)s)"
    default:
      - 256
      - 256
      - 256
    nargs: 3
    type: int

  --patch_atlas_segs:
    help: "Atlas segmentations to use for extracting patches (default: coarse)"
    default:
      - coarse
    action: store
    nargs: '+'


  --n_patches_per_label:
    help: "Number of patches to extract per atlas label (default: %(default)s)"
    default: 5
    type: int

  --patch_labels:
    help: "List of atlas label names, abbreviations, or indices to extract patches from. If not specified, patches are extracted from all labels."
    default: null
    nargs: '+'

  --patch_seed:
    help: "Random seed for reproducible patch sampling (default: %(default)s)"
    default: 42
    type: int

  --crop_labels:
    help: "List of atlas label names, abbreviations, or indices to extract as Imaris crops. If not specified, all labels are cropped."
    default: null
    nargs: '+'

  --crop_atlas_segs:
    help: "Atlas segmentations to use for extracting Imaris crops (default: coarse)"
    default:
      - coarse
    action: store
    nargs: '+'

  --no_patch_uint8:
    help: "Disable conversion of patch NIfTI files to uint8 using robust percentile scaling. By default, patches are converted to uint8 to avoid endianness issues in downstream applications (e.g. SyGlass). (default: %(default)s)"
    action: store_true
    default: False

  --contrast_column:
    help: "Column name in participants.tsv to use for defining group contrasts (e.g., 'treatment', 'genotype'). Required for group-level statistical analysis."
    default: null
    type: str

  --contrast_values:
    help: "Two group values for contrast comparison (e.g., 'control' 'drug'). Used with --contrast_column for statistical testing. Provide exactly 2 values."
    default: null
    nargs: 2


